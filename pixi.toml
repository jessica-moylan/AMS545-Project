[workspace]
channels = ["conda-forge"]
name = "AMS545-Project"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
postgres = "docker exec -it postgis_db psql -U postgres -d gis"
start = "PYTHONPATH=$PYTHONPATH:. python src/ams545/visualize.py"
database = "python data/database.py"


[dependencies]
ipython = ">=9.12.0,<10"
geopandas = ">=1.1.3,<2"
sqlalchemy = ">=2.0.49,<3"
geoalchemy2 = ">=0.19.0,<0.20"
psycopg2 = ">=2.9.11,<3"
python-dotenv = ">=1.2.2,<2"
ipykernel = ">=7.2.0,<8"
shapely = ">=2.1.2,<3"
tk = ">=8.6.13,<9"
python = ">=3.14.4,<3.15"
matplotlib = ">=3.10.9,<4"
numpy = ">=2.4.3,<3"
